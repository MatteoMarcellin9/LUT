<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LUT 50K · Tracker</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{
  --bg:#0d1117;--surface:#161b22;--card:#1c2128;--border:#21262d;
  --text:#e6edf3;--muted:#7d8590;--rock:#586069;
  --accent:#58a6ff;--green:#3fb950;--red:#f85149;--orange:#e3b341;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:14px;min-height:100vh;}

/* HEADER */
header{background:rgba(22,27,34,0.95);border-bottom:1px solid var(--border);padding:10px 16px;
  display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;backdrop-filter:blur(8px);}
.logo{font-weight:900;font-size:20px;color:#e8873a;letter-spacing:-0.5px;}
.logo span{color:var(--text);}
.logo-sub{font-size:11px;color:var(--muted);margin-top:1px;letter-spacing:0.5px;}
.header-actions{display:flex;align-items:center;gap:10px;}
.toggle-wrap{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);}
.toggle{width:36px;height:20px;border-radius:10px;border:none;background:var(--border);cursor:pointer;position:relative;transition:background 0.2s;}
.toggle.on{background:#238636;}
.toggle::after{content:'';position:absolute;width:14px;height:14px;border-radius:50%;background:#fff;top:3px;left:3px;transition:left 0.2s;}
.toggle.on::after{left:19px;}
.status-dot{width:8px;height:8px;border-radius:50%;background:var(--rock);}
.status-dot.ok{background:#3fb950;}
.status-dot.err{background:#f85149;}
.status-dot.loading{background:var(--orange);animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}
.refresh-btn{background:#21262d;border:1px solid var(--border);color:var(--text);padding:6px 14px;
  border-radius:6px;cursor:pointer;font-size:13px;font-family:'Inter',sans-serif;display:flex;align-items:center;gap:6px;font-weight:500;}
.refresh-btn:hover{background:#30363d;}
.refresh-btn.loading .refresh-icon{animation:spin 0.8s linear infinite;}
@keyframes spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}.refresh-icon{display:inline-block;}

/* MAIN */
main{padding:16px;max-width:880px;margin:0 auto;}
.cards-grid{display:flex;flex-direction:column;gap:14px;}
.last-update{text-align:center;font-size:11px;color:var(--muted);margin-top:14px;padding-bottom:24px;}

/* CARD */
.athlete-card{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;transition:border-color 0.2s;}
.athlete-card:hover{border-color:rgba(88,166,255,0.3);}
.athlete-card.finished{border-color:rgba(63,185,80,0.4);}
.athlete-card.dnf{opacity:0.6;}

.card-head{padding:14px 16px;display:flex;align-items:flex-start;gap:12px;border-bottom:1px solid var(--border);}
.card-bib{font-family:'JetBrains Mono',monospace;font-weight:600;font-size:24px;min-width:56px;}
.card-name-wrap{flex:1;}
.card-name{font-weight:700;font-size:15px;line-height:1.2;}
.card-race{font-size:11px;color:var(--muted);margin-top:2px;}
.card-status{font-size:11px;font-weight:700;padding:3px 8px;border-radius:20px;white-space:nowrap;}
.status-running{background:rgba(63,185,80,0.15);color:#3fb950;}
.status-done{background:rgba(88,166,255,0.15);color:#58a6ff;}
.status-dnf{background:rgba(248,81,73,0.15);color:#f85149;}
.status-wait{background:rgba(88,134,255,0.1);color:var(--muted);}

.card-pos-row{padding:10px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);}
.pos-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.pos-text{flex:1;font-size:13px;line-height:1.5;}
.pos-sub{font-size:11px;color:var(--muted);margin-top:2px;}

.card-timer-row{padding:8px 16px;display:flex;align-items:center;gap:8px;font-size:13px;color:var(--muted);border-bottom:1px solid var(--border);}
.timer-val{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:15px;color:#e3b341;font-weight:600;}

.progress-section{padding:10px 16px;}
.progress-bar-bg{height:6px;background:rgba(255,255,255,0.07);border-radius:3px;overflow:hidden;}
.progress-bar-fill{height:100%;border-radius:3px;transition:width 0.5s;}
.progress-labels{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-top:4px;}

.card-stats{padding:8px 16px 0;display:flex;gap:24px;border-top:1px solid var(--border);}
.stat-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:2px;}

.card-eta-row{padding:8px 16px 10px;font-size:12px;color:var(--muted);border-top:1px solid var(--border);}
.card-eta-row strong{color:var(--text);}

/* MAP TOGGLE */
.map-toggle{width:100%;padding:10px 16px;background:rgba(255,255,255,0.03);border:none;border-top:1px solid var(--border);
  color:var(--muted);font-size:12px;font-family:'Inter',sans-serif;cursor:pointer;text-align:left;
  display:flex;align-items:center;gap:8px;transition:background 0.15s;}
.map-toggle:hover{background:rgba(255,255,255,0.06);color:var(--text);}
.chevron{margin-left:auto;}
.map-container{border-top:1px solid var(--border);}
.map{height:300px;background:#0d1a24;}
.elev-wrap{padding:12px 16px;background:var(--surface);}
.elev-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;}

/* LEAFLET */
.leaflet-popup-content-wrapper{background:rgba(22,27,34,0.97);border:1px solid var(--border);color:var(--text);border-radius:8px;}
.leaflet-popup-tip{background:rgba(22,27,34,0.97);}
.leaflet-popup-content{margin:10px 14px;font-family:'Inter',sans-serif;font-size:13px;}
.popup-bib{font-weight:700;margin-bottom:4px;}
.popup-row{font-size:12px;color:var(--muted);}
.cp-tooltip{background:rgba(18,26,34,0.92)!important;border:1px solid rgba(255,255,255,0.2)!important;
  color:#e8eff6!important;font-size:11px!important;font-weight:600!important;padding:3px 8px!important;
  border-radius:4px!important;}
.cp-tooltip::before{display:none!important;}
</style>
</head>

let autoRefresh=false, autoTimer=null;
const mapObjects={}, chartObjects={};
let lastData={};

function gpxPointAtKm(km){
  const targetM=km*1000;
  let best=0,bestD=Infinity;
  for(let i=0;i<GPX.length;i++){const d=Math.abs(GPX[i][3]-targetM);if(d<bestD){bestD=d;best=i;}}
  return GPX[best];
}

function estimateKm(runner){
  if(!runner||!runner.passages||!runner.passages.length) return 0;
  const cpKm={};
  CHECKPOINTS.forEach(c=>cpKm[c.idpt]=c.km);
  let lastPass=null;
  for(const p of runner.passages) if(p.ha && cpKm[p.idpt]!==undefined) lastPass=p;
  if(!lastPass) return 0;
  const lastKm=cpKm[lastPass.idpt];
  if(lastPass.idpt==="100") return TOTAL_KM;
  let nextPrev=null;
  if(runner.prev) for(const pv of runner.prev) if(pv.km && parseFloat(pv.km)>lastKm){nextPrev=pv;break;}
  const now=new Date();
  const parseT=t=>{if(!t)return null;const c=t.length===5?t+":00":t;return new Date("2026-06-26T"+c+"+02:00");};
  const lastT=parseT(lastPass.ha);
  if(!nextPrev||!nextPrev.h) return lastKm;
  const nextKm=parseFloat(nextPrev.km);
  const nextT=parseT(nextPrev.h);
  if(now<=lastT) return lastKm;
  if(now>=nextT) return nextKm;
  return lastKm+(nextKm-lastKm)*((now-lastT)/(nextT-lastT));
}

function formatTimer(){
  const now=new Date();
  if(now<RACE_START) return "--:--:--";
  let s=Math.floor((now-RACE_START)/1000);
  const h=Math.floor(s/3600);s-=h*3600;const m=Math.floor(s/60);s-=m*60;
  return String(h).padStart(2,"0")+":"+String(m).padStart(2,"0")+":"+String(s).padStart(2,"0");
}
setInterval(()=>document.querySelectorAll("[data-timer]").forEach(el=>el.textContent=formatTimer()),1000);

async function refreshAll(){
  const btn=document.getElementById("refreshBtn");
  btn.classList.add("loading");
  document.getElementById("statusDot").className="status-dot loading";
  try{
    const r=await fetch("/api/livetrail");
    const data=await r.json();
    lastData=data;
    renderAll(data);
    document.getElementById("statusDot").className="status-dot ok";
    document.getElementById("lastUpdate").textContent="Ultimo aggiornamento: "+new Date().toLocaleTimeString("it-IT");
  }catch(e){document.getElementById("statusDot").className="status-dot err";}
  btn.classList.remove("loading");
}

function renderAll(data){
  const c=document.getElementById("cardsContainer");
  if(c.querySelector("div[style*=\'80px\']")) c.innerHTML="";
  ATHLETES.forEach(a=>renderCard(a,data[a.doss]));
}

function renderCard(athlete,runner){
  const container=document.getElementById("cardsContainer");
  const cardId="card-"+athlete.doss;
  let card=document.getElementById(cardId);
  if(!card){card=document.createElement("div");card.id=cardId;card.className="athlete-card";container.appendChild(card);}

  const code=runner?.state?.code;
  const hasFinished=code==="f"||(runner?.passages||[]).some(p=>p.idpt==="100"&&p.ha);
  const isDNF=code==="a"||code==="np";
  card.className="athlete-card"+(hasFinished?" finished":isDNF?" dnf":"");

  const km=estimateKm(runner);
  const pct=Math.min(100,Math.round((km/TOTAL_KM)*100));
  const pt=gpxPointAtKm(km);

  const statusHtml=hasFinished?`<span class="card-status status-done">✓ Arrivato</span>`:
    isDNF?`<span class="card-status status-dnf">Ritirato</span>`:
    (runner?.passages?.length)?`<span class="card-status status-running">In gara</span>`:
    `<span class="card-status status-wait">In attesa</span>`;

  let lastCpName="Partenza",lastCpTime="";
  if(runner?.passages){for(const p of runner.passages){if(p.ha){const cp=CHECKPOINTS.find(c=>c.idpt===p.idpt);if(cp){lastCpName=cp.name;lastCpTime=p.ha;}}}}

  const clt=runner?.state?.clt,cltcat=runner?.state?.cltcat,cltsex=runner?.state?.cltsex;
  const posHtml=(clt&&clt!=="-")?`<div class="card-stats">
    <div class="stat">
      <div class="stat-label">${hasFinished?"Posizione finale":"Posizione"}</div>
      <div style="display:flex;align-items:baseline;gap:6px">
        <span style="font-size:22px;font-weight:900;color:${athlete.color}">#${clt}</span>
        ${cltcat?`<span style="font-size:12px;color:var(--muted)">cat. ${cltcat}</span>`:""}
        ${cltsex?`<span style="font-size:12px;color:var(--muted)">${cltsex}ª donna</span>`:""}
      </div>
    </div>
  </div>`:"";

  let etaHtml="";
  if(runner?.prev?.length && !hasFinished){
    const next=runner.prev.find(pv=>pv.km&&parseFloat(pv.km)>km-0.5);
    if(next?.h){const cp=CHECKPOINTS.find(c=>c.idpt===next.idpt);
      etaHtml=`<div class="card-eta-row">🔮 Previsto a <strong>${cp?cp.name:"prossimo punto"}</strong> verso le <strong>${next.h.slice(0,5)}</strong></div>`;
    }
  }

  card.innerHTML=`
    <div class="card-head">
      <div class="card-bib" style="color:${athlete.color}">${athlete.doss}</div>
      <div class="card-name-wrap">
        <div class="card-name">${athlete.name}</div>
        <div class="card-race">50K · Lavaredo Ultra Trail</div>
      </div>
      ${statusHtml}
    </div>
    <div class="card-pos-row">
      <div class="pos-icon" style="background:${athlete.color}22;color:${athlete.color}">📍</div>
      <div class="pos-text">
        ${hasFinished?"Ha tagliato il traguardo 🎉":`Stimato al <strong>km ${km.toFixed(1)}</strong> · alt. ${Math.round(pt[2])}m slm`}
        <div class="pos-sub">Ultimo rilevamento: ${lastCpName}${lastCpTime?" alle "+lastCpTime.slice(0,5):""}</div>
      </div>
    </div>
    <div class="card-timer-row">
      <span>⏱️</span> Tempo in gara
      <span class="timer-val" data-timer>${formatTimer()}</span>
    </div>
    <div class="progress-section">
      <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${pct}%;background:${athlete.color}"></div></div>
      <div class="progress-labels"><span>${km.toFixed(1)} km</span><span>${pct}%</span><span>${TOTAL_KM} km</span></div>
    </div>
    ${posHtml}${etaHtml}
    <button class="map-toggle" onclick="toggleMap('${athlete.doss}')">
      🗺️ Mappa + profilo altimetrico <span class="chevron">▾</span>
    </button>
    <div class="map-container" id="mapwrap-${athlete.doss}" style="display:none">
      <div class="map" id="map-${athlete.doss}"></div>
      <div class="elev-wrap">
        <div class="elev-label">Profilo altimetrico · quota lungo il percorso</div>
        <div style="position:relative;height:200px;"><canvas id="chart-${athlete.doss}"></canvas></div>
      </div>
    </div>`;
}

function toggleMap(doss){
  const wrap=document.getElementById("mapwrap-"+doss);
  const open=wrap.style.display!=="none";
  if(open){wrap.style.display="none";return;}
  wrap.style.display="block";
  const athlete=ATHLETES.find(a=>a.doss===doss);
  if(!mapObjects[doss]){initMap(doss,athlete);initChart(doss,athlete);}
  else setTimeout(()=>mapObjects[doss].map.invalidateSize(),50);
}

function initMap(doss,athlete){
  const latlngs=GPX.map(p=>[p[0],p[1]]);
  const map=L.map("map-"+doss);
  L.tileLayer("https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png",{maxZoom:17,opacity:0.42}).addTo(map);
  L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png",{maxZoom:19,opacity:0.45}).addTo(map);
  L.polyline(latlngs,{color:athlete.color,weight:10,opacity:0.18}).addTo(map);
  L.polyline(latlngs,{color:athlete.color,weight:4.5,opacity:1.0}).addTo(map);
  map.fitBounds(latlngs,{padding:[20,20]});

  CHECKPOINTS.forEach(cp=>{
    L.circleMarker([cp.lat,cp.lng],{radius:5,color:athlete.color,fillColor:"#fff",fillOpacity:1,weight:2}).addTo(map)
      .bindTooltip(cp.name,{permanent:false,direction:"top",offset:[0,-8],className:"cp-tooltip"})
      .bindPopup(`<div class="popup-bib" style="color:${athlete.color}">📍 ${cp.name}</div><div class="popup-row">km <strong>${cp.km}</strong> · <strong>${cp.ele}m</strong></div>`);
  });

  const runner=lastData[doss];
  const km=estimateKm(runner);
  const pt=gpxPointAtKm(km);
  const liveMarker=L.circleMarker([pt[0],pt[1]],{
    radius:8,color:"#fff",fillColor:athlete.color,fillOpacity:1,weight:2.5
  }).addTo(map).bindPopup(`<div class="popup-bib" style="color:${athlete.color}">${athlete.name}</div><div class="popup-row">Stimato km <strong>${km.toFixed(1)}</strong></div>`);

  // Hover
  const hoverDot=L.circleMarker([latlngs[0][0],latlngs[0][1]],{radius:6,color:"#fff",fillColor:athlete.color,fillOpacity:0,opacity:0,weight:2}).addTo(map);
  map.on("mousemove",function(e){
    let bi=0,bd=Infinity;
    for(let i=0;i<GPX.length;i++){const d=map.distance(e.latlng,L.latLng(GPX[i][0],GPX[i][1]));if(d<bd){bd=d;bi=i;}}
    if(bd>600){hoverDot.setStyle({opacity:0,fillOpacity:0});hoverDot.unbindTooltip();
      const ch=chartObjects["chart-"+doss];if(ch){ch._hoverIdx=null;ch.update("none");}return;}
    const p=GPX[bi];
    hoverDot.setLatLng([p[0],p[1]]);hoverDot.setStyle({opacity:1,fillOpacity:0.95});
    hoverDot.bindTooltip(`${(p[3]/1000).toFixed(1)} km · ${Math.round(p[2])}m`,{permanent:true,direction:"top",offset:[0,-10],className:"cp-tooltip"}).openTooltip();
    const ch=chartObjects["chart-"+doss];
    if(ch){let ci=0,cd=Infinity;ch._sampledKm.forEach((sk,i)=>{const df=Math.abs(sk-p[3]/1000);if(df<cd){cd=df;ci=i;}});ch._hoverIdx=ci;ch.update("none");}
  });
  map.on("mouseout",function(){hoverDot.setStyle({opacity:0,fillOpacity:0});hoverDot.unbindTooltip();
    const ch=chartObjects["chart-"+doss];if(ch){ch._hoverIdx=null;ch.update("none");}});

  mapObjects[doss]={map,liveMarker};
  setTimeout(()=>map.invalidateSize(),100);
}

function initChart(doss,athlete){
  const canvas=document.getElementById("chart-"+doss);
  const step=Math.max(1,Math.floor(GPX.length/200));
  const sampled=[];
  for(let i=0;i<GPX.length;i+=step)sampled.push(GPX[i]);
  if(sampled[sampled.length-1]!==GPX[GPX.length-1])sampled.push(GPX[GPX.length-1]);
  const labels=sampled.map(p=>(p[3]/1000).toFixed(1));
  const eles=sampled.map(p=>p[2]);
  const minE=Math.min(...eles),maxE=Math.max(...eles);

  const elevPlugin={id:"elevHover",afterDraw(ch){
    const ctx=ch.ctx,meta=ch.getDatasetMeta(0);
    if(!meta?.data?.length)return;
    const ySc=ch.scales.y;if(!ySc)return;
    if(ch._cpLines&&ch._sampledKm?.length){ch._cpLines.forEach(cp=>{
      let xi=0,md=Infinity;ch._sampledKm.forEach((sk,i)=>{const d=Math.abs(sk-cp.km);if(d<md){md=d;xi=i;}});
      const pt=meta.data[xi];if(!pt)return;
      ctx.save();ctx.beginPath();ctx.moveTo(pt.x,ySc.top);ctx.lineTo(pt.x,ySc.bottom);
      ctx.strokeStyle="rgba(255,255,255,0.2)";ctx.lineWidth=1;ctx.setLineDash([3,3]);ctx.stroke();
      ctx.setLineDash([]);ctx.fillStyle="rgba(255,255,255,0.5)";ctx.font="bold 9px Inter,sans-serif";ctx.textAlign="center";
      ctx.fillText(cp.name.replace("Passo ",""),pt.x,ySc.top+9);ctx.restore();});}
    if(ch._hoverIdx==null)return;
    const hp=meta.data[ch._hoverIdx];if(!hp)return;
    ctx.save();ctx.beginPath();ctx.arc(hp.x,hp.y,7,0,2*Math.PI);ctx.fillStyle="#fff";ctx.fill();
    ctx.beginPath();ctx.arc(hp.x,hp.y,5,0,2*Math.PI);ctx.fillStyle=athlete.color;ctx.fill();ctx.restore();
  }};

  const chart=new Chart(canvas,{type:"line",plugins:[elevPlugin],
    data:{labels,datasets:[{data:eles,borderColor:athlete.color,borderWidth:2,fill:true,backgroundColor:athlete.color+"22",pointRadius:0,tension:0.3}]},
    options:{responsive:true,maintainAspectRatio:false,animation:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{title:c=>`km ${c[0].label}`,label:c=>`${Math.round(c.raw)}m slm`}}},
      scales:{
        x:{ticks:{color:"#7d8590",font:{size:9},maxTicksLimit:8},grid:{color:"rgba(255,255,255,0.05)"},title:{display:true,text:"km",color:"#7d8590",font:{size:9}}},
        y:{ticks:{color:"#7d8590",font:{size:9},maxTicksLimit:5,callback:v=>v+"m"},grid:{color:"rgba(255,255,255,0.07)"},suggestedMin:minE-50,suggestedMax:maxE+50}
      }}});
  chart._sampledKm=sampled.map(p=>p[3]/1000);
  chart._cpLines=CHECKPOINTS.filter(c=>c.km>0&&c.km<TOTAL_KM);
  chart._hoverIdx=null;
  chartObjects["chart-"+doss]=chart;
}

function toggleAuto(){
  autoRefresh=!autoRefresh;
  document.getElementById("autoToggle").className="toggle"+(autoRefresh?" on":"");
  document.getElementById("autoLabel").textContent=autoRefresh?"Auto ✓":"Auto";
  if(autoTimer)clearInterval(autoTimer);
  if(autoRefresh)autoTimer=setInterval(refreshAll,2*60*1000);
}

refreshAll();
</script>
