<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LUT 50K · Tracker</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>

@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=JetBrains+Mono:wght@400;600&display=swap');
:root{--bg:#0a0f14;--surface:rgba(18,26,34,0.85);--border:rgba(255,255,255,0.09);--text:#e8eff6;--muted:#7a8fa0;--accent:#e8873a;--green:#4caf7d;--blue:#6ab0d4;--red:#e05a4e;--rock:#8fa3b0;}
*{margin:0;padding:0;box-sizing:border-box;}
body{color:var(--text);font-family:'Inter',sans-serif;font-size:14px;min-height:100vh;position:relative;}
body::before{content:'';position:fixed;inset:0;background-image:url('/civetta.jpg');background-size:cover;background-position:center 30%;background-attachment:fixed;filter:brightness(0.18) saturate(0.5) sepia(0.3);z-index:0;}
body::after{content:'';position:fixed;inset:0;background:linear-gradient(to bottom,rgba(10,15,20,0.55) 0%,rgba(10,15,20,0.2) 40%,rgba(10,15,20,0.6) 100%);z-index:0;}
header,main{position:relative;z-index:1;}
header{border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;gap:14px;position:sticky;top:0;background:rgba(8,13,18,0.92);backdrop-filter:blur(12px);z-index:100;}
.logo{font-weight:900;font-size:20px;letter-spacing:-0.5px;color:var(--accent);}
.logo span{color:var(--text);}
.logo-sub{font-size:10px;color:var(--rock);font-family:'JetBrains Mono',monospace;letter-spacing:1px;text-transform:uppercase;margin-top:1px;}
.header-actions{margin-left:auto;display:flex;gap:8px;align-items:center;}
.refresh-btn{background:var(--accent);color:#fff;border:none;border-radius:6px;padding:7px 14px;font-size:13px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:opacity 0.15s;display:flex;align-items:center;gap:6px;}
.refresh-btn:hover{opacity:0.85;}.refresh-btn:disabled{opacity:0.4;cursor:not-allowed;}
.toggle-wrap{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);}
.toggle{width:32px;height:18px;background:rgba(255,255,255,0.12);border-radius:9px;position:relative;cursor:pointer;border:none;transition:background 0.2s;}
.toggle.on{background:var(--accent);}
.toggle::after{content:'';position:absolute;width:12px;height:12px;border-radius:50%;background:#fff;top:3px;left:3px;transition:left 0.2s;}
.toggle.on::after{left:17px;}
.status-dot{width:8px;height:8px;border-radius:50%;background:var(--muted);}
.status-dot.live{background:var(--green);box-shadow:0 0 6px var(--green);animation:pdot 2s infinite;}
@keyframes pdot{0%,100%{opacity:1}50%{opacity:0.4}}
main{padding:20px;max-width:1000px;margin:0 auto;}
.cards-grid{display:grid;gap:16px;}

/* CARD */
.athlete-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;backdrop-filter:blur(10px);box-shadow:0 4px 24px rgba(0,0,0,0.4);transition:border-color 0.3s;}
.athlete-card.finished{border-color:rgba(76,175,125,0.5);}
.athlete-card.dnf{border-color:rgba(224,90,78,0.4);opacity:0.7;}
.card-header{padding:14px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border);}
.card-bib{font-family:'JetBrains Mono',monospace;font-weight:600;font-size:22px;min-width:50px;}
.card-name{font-weight:700;font-size:15px;flex:1;}
.card-club{font-size:11px;color:var(--muted);margin-top:2px;}
.race-badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:5px;font-family:'JetBrains Mono',monospace;white-space:nowrap;}
.card-status{font-size:11px;font-weight:600;padding:3px 9px;border-radius:5px;white-space:nowrap;}
.status-running{background:rgba(232,135,58,0.18);color:var(--accent);}
.status-done{background:rgba(76,175,125,0.18);color:var(--green);}
.status-dnf{background:rgba(224,90,78,0.18);color:var(--red);}
.status-wait{background:rgba(122,143,160,0.18);color:var(--muted);}

/* GPS row */
.card-gps-row{padding:8px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;font-size:12px;}
.gps-dot{width:7px;height:7px;border-radius:50%;background:var(--muted);flex-shrink:0;}
.gps-dot.active{background:var(--green);box-shadow:0 0 5px var(--green);animation:pdot 2s infinite;}
.gps-text{flex:1;color:var(--muted);}
.gps-text strong{color:var(--text);}
.gps-coords{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--rock);}
.btn-sm{font-size:11px;font-weight:600;color:var(--blue);text-decoration:none;padding:3px 8px;border:1px solid rgba(106,176,212,0.3);border-radius:4px;background:rgba(106,176,212,0.08);white-space:nowrap;cursor:pointer;}
.btn-sm:hover{background:rgba(106,176,212,0.18);}

/* MAP TOGGLE */
.card-map-toggle-btn{
  width:100%; padding:9px 16px;
  background:transparent; border:none; border-bottom:1px solid var(--border);
  color:var(--muted); font-size:12px; font-family:'Inter',sans-serif;
  cursor:pointer; display:flex; align-items:center; gap:8px;
  transition:background 0.15s; text-align:left;
}
.card-map-toggle-btn:hover{background:rgba(255,255,255,0.04); color:var(--text);}
.card-map-toggle-btn .toggle-arrow{margin-left:auto; font-size:10px; transition:transform 0.2s;}
.card-map-toggle-btn.open .toggle-arrow{transform:rotate(180deg);}
.card-map-collapsible{display:none; border-bottom:1px solid var(--border);}
.card-map-collapsible.open{display:block;}
.card-map{height:280px; width:100%; background:#0d1a24;}

/* ELEVATION */
.card-elevation{padding:14px 16px;}
.elevation-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;}
.elevation-chart-wrap{height:200px;position:relative;}

/* PROGRESS */
.card-progress{padding:12px 16px;border-top:1px solid var(--border);}
.progress-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;display:flex;justify-content:space-between;}
.progress-label strong{color:var(--text);font-weight:600;}
.progress-bar-wrap{background:rgba(255,255,255,0.08);border-radius:4px;height:5px;overflow:hidden;}
.progress-bar{height:5px;border-radius:4px;background:var(--accent);transition:width 0.6s ease;}
.progress-bar.done{background:var(--green);}

/* SPLITS */
.card-splits{padding:12px 16px 14px;}
.splits-label{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;}
.splits-timeline{display:flex;align-items:flex-start;overflow-x:auto;padding-bottom:4px;}
.split-item{display:flex;flex-direction:column;align-items:center;flex:1;min-width:64px;position:relative;}
.split-item:not(:last-child)::after{content:'';position:absolute;top:10px;left:50%;width:100%;height:2px;background:rgba(255,255,255,0.08);z-index:0;}
.split-item.done:not(:last-child)::after{background:var(--accent);opacity:0.6;}
.split-dot{width:20px;height:20px;border-radius:50%;border:2px solid rgba(255,255,255,0.15);background:rgba(10,15,20,0.6);z-index:1;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0;margin-bottom:6px;}
.split-dot.done{border-color:var(--accent);background:var(--accent);color:#fff;}
.split-dot.finish.done{border-color:var(--green);background:var(--green);}
.split-dot.current{border-color:var(--accent);background:rgba(10,15,20,0.8);color:var(--accent);animation:pdot 1.5s infinite;}
.split-label{font-size:10px;color:var(--muted);text-align:center;line-height:1.3;}
.split-time{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;color:var(--accent);text-align:center;margin-top:2px;}
.split-item.done .split-label{color:var(--text);}
.card-stats{padding:0 16px 14px;display:flex;gap:20px;flex-wrap:wrap;}
.stat{display:flex;flex-direction:column;gap:2px;}
.stat-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.8px;}
.stat-value{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:600;}
.stat-value.hi{color:var(--accent);}
.last-update{text-align:center;font-size:11px;color:var(--muted);margin-top:20px;padding-bottom:40px;font-family:'JetBrains Mono',monospace;}
@keyframes spin{to{transform:rotate(360deg);}}
/* TIMER */
.card-timer{padding:8px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;background:rgba(255,255,255,0.02);}
.timer-icon{font-size:14px;}
.timer-text{flex:1;font-size:12px;color:var(--muted);}
.timer-value{font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:700;color:var(--text);}
.timer-value.running{color:var(--accent);}
.timer-value.finished{color:var(--green);}

.spinning{display:inline-block;animation:spin 0.8s linear infinite;}

/* Leaflet dark overrides */
.leaflet-container{background:#0d1a24;}
.leaflet-popup-content-wrapper{background:rgba(18,26,34,0.95);border:1px solid rgba(255,255,255,0.15);color:var(--text);border-radius:8px;}
.leaflet-popup-tip{background:rgba(18,26,34,0.95);}
.leaflet-popup-content{margin:10px 14px;font-family:'Inter',sans-serif;font-size:13px;}
.cp-tooltip{background:rgba(18,26,34,0.92)!important;border:1px solid rgba(255,255,255,0.2)!important;color:#e8eff6!important;font-family:'Inter',sans-serif!important;font-size:11px!important;font-weight:600!important;padding:3px 8px!important;border-radius:4px!important;box-shadow:0 2px 8px rgba(0,0,0,0.5)!important;}
.cp-tooltip::before{display:none!important;}
.popup-bib{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:16px;}
.popup-row{font-size:12px;color:var(--muted);margin-top:3px;}
.popup-row strong{color:var(--text);}

</style>
</head>

function nearestGPXPoint(lat, lng){
  let best=0, bestD=Infinity;
  for(let i=0;i<GPX.length;i++){
    const d=(GPX[i][0]-lat)**2+(GPX[i][1]-lng)**2;
    if(d<bestD){bestD=d;best=i;}
  }
  return best;
}

function gpxPointAtKm(km){
  const targetM = km*1000;
  let best=0, bestD=Infinity;
  for(let i=0;i<GPX.length;i++){
    const d=Math.abs(GPX[i][3]-targetM);
    if(d<bestD){bestD=d;best=i;}
  }
  return GPX[best];
}

// Stima posizione km interpolando tra ultimo passaggio e prossima previsione
function estimateKm(runner){
  if(!runner || !runner.passages || runner.passages.length===0) return 0;

  // Mappa idpt -> km checkpoint
  const cpKm = {};
  CHECKPOINTS.forEach(c => cpKm[c.idpt] = c.km);

  // Ultimo passaggio reale con orario valido
  let lastPass = null;
  for(const p of runner.passages){
    if(p.ha && cpKm[p.idpt] !== undefined) lastPass = p;
  }
  if(!lastPass) return 0;

  const lastKm = cpKm[lastPass.idpt];

  // Se è arrivato (idpt 100), è al traguardo
  if(lastPass.idpt === "100") return TOTAL_KM;

  // Prossima previsione
  let nextPrev = null;
  if(runner.prev && runner.prev.length){
    for(const pv of runner.prev){
      if(pv.km && parseFloat(pv.km) > lastKm){ nextPrev = pv; break; }
    }
  }

  const now = new Date();
  const raceDate = "2026-06-26";

  function parseTime(t){
    if(!t) return null;
    const clean = t.length===5 ? t+":00" : t;
    return new Date(`${raceDate}T${clean}+02:00`);
  }

  const lastT = parseTime(lastPass.ha);
  if(!nextPrev || !nextPrev.h){
    return lastKm; // nessuna previsione, resta all'ultimo CP
  }
  const nextKm = parseFloat(nextPrev.km);
  const nextT = parseTime(nextPrev.h);

  if(now <= lastT) return lastKm;
  if(now >= nextT) return nextKm;

  const frac = (now - lastT) / (nextT - lastT);
  return lastKm + (nextKm - lastKm) * frac;
}

function formatRaceTimer(){
  const now = new Date();
  if(now < RACE_START) return "--:--:--";
  let s = Math.floor((now - RACE_START)/1000);
  const h = Math.floor(s/3600); s -= h*3600;
  const m = Math.floor(s/60); s -= m*60;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

let timerInterval = setInterval(()=>{
  document.querySelectorAll('[data-timer]').forEach(el=>{

}, 1000);

async function refreshAll(){
  const btn = document.getElementById('refreshBtn');
  const icon = document.getElementById('refreshIcon');
  icon.style.display='inline-block';
  btn.classList.add('loading');
  document.getElementById('statusDot').className='status-dot loading';

  try {
    const r = await fetch('/api/livetrail');
    const data = await r.json();
    renderAll(data);
    document.getElementById('statusDot').className='status-dot ok';
    document.getElementById('lastUpdate').textContent = 'Ultimo aggiornamento: ' + new Date().toLocaleTimeString('it-IT');
  } catch(e){
    document.getElementById('statusDot').className='status-dot err';
    console.error(e);
  }
  btn.classList.remove('loading');
}

function renderAll(data){
  const container = document.getElementById('cardsContainer');
  // Pulisci placeholder iniziale
  if(container.querySelector('div[style*="80px"]')) container.innerHTML='';

  ATHLETES.forEach(a => renderCard(a, data[a.doss]));
}

function renderCard(athlete, runner){
  const container = document.getElementById('cardsContainer');
  const cardId = 'card-'+athlete.doss;
  let card = document.getElementById(cardId);
  const isNew = !card;
  if(isNew){ card=document.createElement('div'); card.id=cardId; card.className='athlete-card'; container.appendChild(card); }

  const hasError = !runner || runner.error;
  const code = runner?.state?.code;
  const hasFinished = code === 'f' || (runner?.passages||[]).some(p=>p.idpt==="100" && p.ha);
  const isDNF = code === 'a' || code === 'np';

  card.className = 'athlete-card'+(hasFinished?' finished':isDNF?' dnf':'');

  const km = estimateKm(runner);
  const pct = Math.min(100, Math.round((km/TOTAL_KM)*100));
  const pt = gpxPointAtKm(km);

  // Stato
  const statusHtml = hasFinished?`<span class="card-status status-done">✓ Arrivato</span>`:
    isDNF?`<span class="card-status status-dnf">Ritirato</span>`:
    (runner && runner.passages && runner.passages.length>0)?`<span class="card-status status-running">In gara</span>`:
    `<span class="card-status status-wait">In attesa</span>`;

  // Classifica
  const clt = runner?.state?.clt;
  const cltsex = runner?.state?.cltsex;
  const cltcat = runner?.state?.cltcat;
  let posHtml = "";
  if(clt && clt !== "-"){
    const posLabel = hasFinished ? "Posizione finale" : "Posizione";
    posHtml = `<div class="stat">
      <div class="stat-label">${posLabel}</div>
      <div style="display:flex;align-items:baseline;gap:4px">
        <span style="font-size:22px;font-weight:900;color:${athlete.color}">#${clt}</span>
        ${cltcat?`<span style="font-size:12px;color:var(--muted)">cat. ${cltcat}</span>`:''}
      </div>
    </div>`;
  }

  // Ultimo checkpoint
  let lastCpName = "Partenza", lastCpTime = "";
  if(runner && runner.passages){
    for(const p of runner.passages){
      if(p.ha){
        const cp = CHECKPOINTS.find(c=>c.idpt===p.idpt);
        if(cp){ lastCpName = cp.name; lastCpTime = p.ha; }
      }
    }
  }

  // Prossima previsione
  let nextHtml = "";
  if(runner && runner.prev && runner.prev.length && !hasFinished){
    const next = runner.prev.find(pv => pv.km && parseFloat(pv.km) > km - 0.5);
    if(next && next.h){
      const cp = CHECKPOINTS.find(c=>c.idpt===next.idpt);
      const cpName = cp ? cp.name : "prossimo punto";
      nextHtml = `<div class="card-eta-row">
        🔮 Previsto a <strong>${cpName}</strong> verso le <strong>${next.h.slice(0,5)}</strong>
      </div>`;
    }
  }

  const ele = Math.round(pt[2]);

  card.innerHTML = `
    <div class="card-head">
      <div class="card-bib" style="color:${athlete.color}">${athlete.doss}</div>
      <div class="card-name-wrap">
        <div class="card-name">${athlete.name}</div>
        <div class="card-race">50K</div>
      </div>
      ${statusHtml}
    </div>

    <div class="card-pos-row">
      <div class="pos-icon" style="background:${athlete.color}22;color:${athlete.color}">📍</div>
      <div class="pos-text">
        ${hasFinished?'Ha tagliato il traguardo':`Stimato al <strong>km ${km.toFixed(1)}</strong> · alt. ${ele}m`}
        <div class="pos-sub">Ultimo rilevamento: ${lastCpName}${lastCpTime?' alle '+lastCpTime.slice(0,5):''}</div>
      </div>
    </div>

    <div class="card-timer-row">
      <span class="timer-icon">⏱️</span> Tempo in gara
      <span class="timer-val" data-timer>${formatRaceTimer()}</span>
    </div>

    <div class="progress-section">
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" style="width:${pct}%;background:${athlete.color}"></div>
      </div>
      <div class="progress-labels">
        <span>${km.toFixed(1)} km</span>
        <span>${pct}%</span>
        <span>${TOTAL_KM} km</span>
      </div>
    </div>

    ${posHtml ? `<div class="card-stats">${posHtml}</div>` : ''}
    ${nextHtml}

    <button class="map-toggle" onclick="toggleMap('${athlete.doss}')">
      🗺️ Mappa + profilo altimetrico <span class="chevron">▾</span>
    </button>
    <div class="map-container" id="mapwrap-${athlete.doss}" style="display:none">
      <div class="map" id="map-${athlete.doss}"></div>
      <div class="elev-wrap">
        <div class="elev-label">Profilo altimetrico · quota lungo il percorso</div>
        <div style="position:relative;height:200px;"><canvas id="chart-${athlete.doss}"></canvas></div>
      </div>
    </div>
  `;
}

function toggleMap(doss){
  const wrap = document.getElementById('mapwrap-'+doss);
  const isOpen = wrap.style.display !== 'none';
  if(isOpen){ wrap.style.display='none'; return; }
  wrap.style.display='block';

  const athlete = ATHLETES.find(a=>a.doss===doss);
  if(!mapObjects[doss]){
    initMap(doss, athlete);
    initChart(doss, athlete);
  }
}

function initMap(doss, athlete){
  const mapId = 'map-'+doss;
  const latlngs = GPX.map(p=>[p[0],p[1]]);
  const mid = latlngs[Math.floor(latlngs.length/2)];
  const map = L.map(mapId).setView(mid, 13);

  L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png',{maxZoom:17,opacity:0.42}).addTo(map);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png',{maxZoom:19,opacity:0.45}).addTo(map);

  // Tracciato
  L.polyline(latlngs,{color:athlete.color,weight:10,opacity:0.18}).addTo(map);
  L.polyline(latlngs,{color:athlete.color,weight:4.5,opacity:1.0}).addTo(map);

  map.fitBounds(latlngs);

  // Checkpoint markers
  CHECKPOINTS.forEach(cp => {
    const cpIcon = L.divIcon({
      html:`<div style="width:10px;height:10px;border-radius:50%;background:#fff;border:2px solid ${athlete.color};box-shadow:0 0 4px rgba(0,0,0,0.5)"></div>`,
      iconSize:[10,10], iconAnchor:[5,5], className:''
    });
    L.marker([cp.lat,cp.lng],{icon:cpIcon}).addTo(map)
      .bindTooltip(cp.name,{permanent:false,direction:'top',offset:[0,-8],className:'cp-tooltip'})
      .bindPopup(`<div class="popup-bib" style="color:${athlete.color}">📍 ${cp.name}</div>
        <div class="popup-row">km <strong>${cp.km}</strong></div>
        <div class="popup-row">⛰️ <strong>${cp.ele}m</strong> slm</div>`);
  });

  // Puntino posizione stimata
  const km = estimateKm(window._lastData ? window._lastData[doss] : null);
  const pt = gpxPointAtKm(km);
  const liveIcon = L.divIcon({
    html:`<div style="width:18px;height:18px;border-radius:50%;background:${athlete.color};border:3px solid #fff;box-shadow:0 0 10px ${athlete.color}"></div>`,
    iconSize:[18,18], iconAnchor:[9,9], className:''
  });
  const liveMarker = L.marker([pt[0],pt[1]],{icon:liveIcon}).addTo(map)
    .bindPopup(`<div class="popup-bib" style="color:${athlete.color}">${athlete.name}</div>
      <div class="popup-row">Stimato al km <strong>${km.toFixed(1)}</strong></div>`);

  // Hover sul tracciato
  const hoverDot = L.circleMarker([latlngs[0][0],latlngs[0][1]],{
    radius:6,color:'#fff',fillColor:athlete.color,fillOpacity:0,opacity:0,weight:2
  }).addTo(map);

  map.on('mousemove', function(e){
    let bestI=0,bestD=Infinity;
    for(let i=0;i<GPX.length;i++){
      const d=map.distance(e.latlng, L.latLng(GPX[i][0],GPX[i][1]));
      if(d<bestD){bestD=d;bestI=i;}
    }
    if(bestD>600){
      hoverDot.setStyle({opacity:0,fillOpacity:0});
      hoverDot.unbindTooltip();
      const ch=chartObjects['chart-'+doss];
      if(ch){ch._hoverIdx=null;ch.update('none');}
      return;
    }
    const pt=GPX[bestI];
    hoverDot.setLatLng([pt[0],pt[1]]);
    hoverDot.setStyle({opacity:1,fillOpacity:0.95});
    hoverDot.bindTooltip(`${(pt[3]/1000).toFixed(1)} km · ${Math.round(pt[2])}m`,
      {permanent:true,direction:'top',offset:[0,-10],className:'cp-tooltip'}).openTooltip();
    const ch=chartObjects['chart-'+doss];
    if(ch){
      const km=pt[3]/1000;
      let ci=0,cd=Infinity;
      ch._sampledKm.forEach((sk,i)=>{const diff=Math.abs(sk-km);if(diff<cd){cd=diff;ci=i;}});
      ch._hoverIdx=ci; ch.update('none');
    }
  });
  map.on('mouseout', function(){
    hoverDot.setStyle({opacity:0,fillOpacity:0});
    hoverDot.unbindTooltip();
    const ch=chartObjects['chart-'+doss];
    if(ch){ch._hoverIdx=null;ch.update('none');}
  });

  mapObjects[doss] = {map, liveMarker};
  setTimeout(()=>map.invalidateSize(), 100);
}

function initChart(doss, athlete){
  const canvas = document.getElementById('chart-'+doss);
  const step = Math.max(1, Math.floor(GPX.length/200));
  const sampled = [];
  for(let i=0;i<GPX.length;i+=step) sampled.push(GPX[i]);
  if(sampled[sampled.length-1]!==GPX[GPX.length-1]) sampled.push(GPX[GPX.length-1]);

  const labels = sampled.map(p=>(p[3]/1000).toFixed(1));
  const eles = sampled.map(p=>p[2]);
  const minE = Math.min(...eles), maxE = Math.max(...eles);

  // Plugin: linee checkpoint + puntino hover
  const elevPlugin = {
    id:'elevHover',
    afterDraw(ch){
      const ctx=ch.ctx;
      const meta=ch.getDatasetMeta(0);
      if(!meta||!meta.data||!meta.data.length) return;
      const ySc=ch.scales.y;
      if(!ySc) return;

      // Linee checkpoint
      if(ch._cpLines && ch._sampledKm && ch._sampledKm.length){
        ch._cpLines.forEach(cp=>{
          let xi=0,minDiff=Infinity;
          ch._sampledKm.forEach((sk,i)=>{const diff=Math.abs(sk-cp.km);if(diff<minDiff){minDiff=diff;xi=i;}});
          const pt=meta.data[xi];
          if(!pt) return;
          ctx.save();
          ctx.beginPath();ctx.moveTo(pt.x,ySc.top);ctx.lineTo(pt.x,ySc.bottom);
          ctx.strokeStyle='rgba(255,255,255,0.22)';ctx.lineWidth=1;ctx.setLineDash([3,3]);ctx.stroke();
          ctx.setLineDash([]);
          ctx.fillStyle='rgba(255,255,255,0.5)';ctx.font='bold 9px Inter,sans-serif';ctx.textAlign='center';
          ctx.fillText(cp.name.replace('Passo ','').replace('Croda da Lago','Croda'), pt.x, ySc.top+9);
          ctx.restore();
        });
      }

      // Puntino hover
      if(ch._hoverIdx==null) return;
      const hpt=meta.data[ch._hoverIdx];
      if(!hpt) return;
      ctx.save();
      ctx.beginPath();ctx.arc(hpt.x,hpt.y,7,0,2*Math.PI);ctx.fillStyle='#fff';ctx.fill();
      ctx.beginPath();ctx.arc(hpt.x,hpt.y,5,0,2*Math.PI);ctx.fillStyle=athlete.color;ctx.fill();
      ctx.restore();
    }
  };

  const chart = new Chart(canvas, {
    type:'line',
    plugins:[elevPlugin],
    data:{
      labels,
      datasets:[{
        data:eles,
        borderColor:athlete.color,
        borderWidth:2,
        fill:true,
        backgroundColor:athlete.color+'22',
        pointRadius:0,
        tension:0.3,
      }]
    },
    options:{
      responsive:true, maintainAspectRatio:false, animation:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{title:ctx=>`km ${ctx[0].label}`,label:ctx=>`${Math.round(ctx.raw)}m slm`}}},
      scales:{
        x:{ticks:{color:'#7d8590',font:{size:9},maxTicksLimit:8},grid:{color:'rgba(255,255,255,0.05)'},title:{display:true,text:'km',color:'#7d8590',font:{size:9}}},
        y:{ticks:{color:'#7d8590',font:{size:9},maxTicksLimit:5,callback:v=>v+'m'},grid:{color:'rgba(255,255,255,0.07)'},suggestedMin:minE-50,suggestedMax:maxE+50}
      }
    }
  });

  chart._sampledKm = sampled.map(p=>p[3]/1000);
  chart._cpLines = CHECKPOINTS.filter(c=>c.km>0 && c.km<TOTAL_KM);
  chart._hoverIdx = null;
  chartObjects['chart-'+doss] = chart;
}

function toggleAuto(){
  autoRefresh = !autoRefresh;
  document.getElementById('autoToggle').className = 'toggle'+(autoRefresh?' on':'');
  document.getElementById('autoLabel').textContent = autoRefresh?'Auto ✓':'Auto';
  if(autoTimer) clearInterval(autoTimer);
  if(autoRefresh) autoTimer = setInterval(refreshAll, 2*60*1000); // 2 minuti
}

// Salva i dati per il marker live, e refresh iniziale
const origRender = renderAll;
renderAll = function(data){ window._lastData = data; origRender(data); };

refreshAll();
</script>
